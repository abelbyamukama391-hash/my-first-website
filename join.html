<!DOCTYPE html>
<html>
<head>
  <title>Join Wildlife Club</title>
  <style>
    body { 
      font-family: Arial; 
      background: #e8f5e9; 
      color: #1b5e20;
      padding: 40px;
    }
    .form-box {
      background: white;
      max-width: 400px;
      margin: auto;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 3px 8px rgba(0,0,0,0.1);
    }
    h1 { text-align: center; }
    label { display: block; margin-top: 15px; font-weight: bold; }
    input {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      border: 1px solid #ccc;
      border-radius: 6px;
      box-sizing: border-box;
    }
    button {
      width: 100%;
      margin-top: 20px;
      padding: 12px;
      background: #1b5e20;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      cursor: pointer;
    }
    button:hover { background: #2e7d32; }
    a { display: block; text-align: center; margin-top: 15px; color: #1b5e20; }
  </style>
</head>
<body>
  <div class="form-box">
    <h1>Join the Club</h1>
    <form>
      <label for="name">Full Name</label>
      <input type="text" id="name" name="name" placeholder="e.g. Karungi Brenda" required>

      <label for="class">Class</label>
      <input type="text" id="class" name="class" placeholder="e.g. S3 West" required>

      <label for="phone">Phone Number</label>
      <input type="tel" id="phone" name="phone" placeholder="e.g. 0783..." required>

      <button type="submit">Submit</button>

<p style="text-align:center; margin-top:10px;">
  Or <a href="https://wa.me/256772684321" target="_blank">Chat on WhatsApp</a>
</p>

</form>
    <a href="index.html">← Back to Home</a>
  </div>
</body>
</html>
